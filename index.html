<!DOCTYPE html>
<!-- KUMON 실적관리 v2.1 2026-06-16 -->
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>KUMON 시상 및 인센티브 현황 조회</title>
<meta name="description" content="이름·사번으로 로그인하여 실적과 순위를 확인하세요.">
<meta property="og:title" content="KUMON 시상 및 인센티브 현황 조회">
<meta property="og:description" content="이름·사번으로 로그인하여 실적과 순위를 확인하세요.">
<meta property="og:type" content="website">
<link rel="stylesheet" as="style" crossorigin href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
:root{
  --bg:#F4F5F3; --card:#FFFFFF; --card2:#F7F8F6;
  --green:#1D9E75; --green-d:#0F6E56; --green-l:#E1F5EE; --green-ll:#F0FBF7;
  --blue:#185FA5; --blue-l:#E6F1FB; --blue-ll:#B5D4F4;
  --amber:#BA7517; --amber-l:#FAEEDA;
  --red:#A32D2D; --red-l:#FCEBEB;
  --t1:#1A1C1A; --t2:#5E635E; --t3:#9CA29C;
  --bd:#E6E8E4; --bd2:#D2D6D0;
  --r-sm:8px; --r-md:11px; --r-lg:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  font-family:'Pretendard',-apple-system,BlinkMacSystemFont,system-ui,sans-serif;
  font-size:14px;color:var(--t1);background:var(--bg);
  -webkit-font-smoothing:antialiased;
}
input,button{font-family:inherit;font-size:14px}
.app{max-width:480px;margin:0 auto;min-height:100vh;background:var(--bg);position:relative}
.page{display:none}.page.active{display:block}

/* 로딩 */
.loading{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;gap:18px;color:var(--t2)}
.spin{width:38px;height:38px;border:3px solid var(--bd2);border-top-color:var(--green);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* 로그인 */
.lw{padding:2rem 1.25rem;min-height:100vh;display:flex;align-items:center;justify-content:center}
.lc{width:100%;max-width:380px}
.logo{text-align:center;margin-bottom:2rem}
.logo .k{font-size:34px;font-weight:800;letter-spacing:-0.02em;color:var(--t1)}
.logo .s{font-size:15px;font-weight:600;color:var(--green);margin-top:6px}
.logo .d{font-size:12px;color:var(--t2);margin-top:10px}
.lcard{background:var(--card);border:1px solid var(--bd);border-radius:var(--r-lg);padding:1.75rem 1.5rem;box-shadow:0 1px 3px rgba(0,0,0,.04)}
.dbadge{margin-bottom:1.25rem}
.fl{font-size:12px;font-weight:600;color:var(--t2);margin-bottom:6px;display:block}
.fi{width:100%;padding:12px 14px;border:1px solid var(--bd2);border-radius:var(--r-md);background:var(--card2);color:var(--t1);margin-bottom:12px;transition:border-color .15s}
.fi:focus{outline:none;border-color:var(--green);background:#fff}
.bg{width:100%;padding:13px;background:var(--green);color:#fff;border:none;border-radius:var(--r-md);font-size:15px;font-weight:600;cursor:pointer;margin-top:4px;transition:background .15s}
.bg:active{background:var(--green-d)}
.err{font-size:12px;color:var(--red);text-align:center;margin-top:10px;min-height:18px}

/* 헤더 */
.hdr{background:var(--card);border-bottom:1px solid var(--bd);padding:0 1rem;display:flex;align-items:center;justify-content:space-between;height:54px;position:sticky;top:0;z-index:10}
.hbrand{font-size:16px;font-weight:700}.hbrand span{color:var(--green);font-weight:600}
.hr{display:flex;align-items:center;gap:10px}
.uname{font-size:12px;color:var(--t2);font-weight:500}
.bo{font-size:12px;color:var(--t2);background:none;border:1px solid var(--bd2);border-radius:var(--r-sm);padding:6px 11px;cursor:pointer;font-weight:500}
.bo:active{background:var(--card2)}

/* 탭 */
.tb{display:flex;background:var(--card);border-bottom:1px solid var(--bd);overflow-x:auto;scrollbar-width:none;position:sticky;top:54px;z-index:9}
.tb::-webkit-scrollbar{display:none}
.tbn{flex-shrink:0;padding:12px 16px;font-size:13px;font-weight:500;color:var(--t2);background:none;border:none;border-bottom:2px solid transparent;cursor:pointer;white-space:nowrap}
.tbn.on{color:var(--green);border-bottom-color:var(--green);font-weight:600}
.bd{padding:1.1rem}

/* 타이틀 */
.mt{font-size:18px;font-weight:700;margin-bottom:0.9rem;letter-spacing:-0.01em}
.stl{font-size:13px;font-weight:600;color:var(--t1);margin-bottom:9px;margin-top:2px}

/* 영웅 카드 */
.hc{background:var(--card);border:1px solid var(--bd);border-radius:var(--r-lg);padding:1.4rem;margin-bottom:1rem;box-shadow:0 1px 3px rgba(0,0,0,.03)}
.ht{display:flex;align-items:center;gap:13px;margin-bottom:1.25rem}
.av{width:52px;height:52px;border-radius:50%;background:var(--green-l);display:flex;align-items:center;justify-content:center;font-size:17px;font-weight:700;color:var(--green-d);flex-shrink:0}
.av.b{background:var(--blue-l);color:var(--blue)}
.av.av-sq{border-radius:12px;font-size:11.5px;font-weight:700;line-height:1.15;text-align:center;padding:4px;word-break:keep-all;letter-spacing:-0.02em}
.sr2{display:grid;grid-template-columns:1fr 1fr;gap:9px;text-align:center;margin-top:9px}
.sr2 .slb{line-height:1.35}
.minwarn{margin-top:12px;padding:9px 12px;background:var(--red-l);color:var(--red);border-radius:var(--r-sm);font-size:11.5px;font-weight:600;text-align:center;line-height:1.4}
.hn{font-size:17px;font-weight:700}
.hsb{font-size:12px;color:var(--t2);margin-top:3px;display:flex;align-items:center;gap:6px;flex-wrap:wrap}
.sr{display:grid;grid-template-columns:1fr 1fr 1fr;gap:9px;text-align:center}
.sb{background:var(--card2);border-radius:var(--r-md);padding:13px 6px}
.sb.flip{display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px}
.sb.flip .slb{margin-top:0}
.sn{font-size:22px;font-weight:800;letter-spacing:-0.02em}
.sn.g{color:var(--green)}.sn.y{color:var(--amber)}.sn.bl{color:var(--blue)}.sn.r{color:var(--red)}
.slb{font-size:11px;color:var(--t2);margin-top:3px;font-weight:500}

/* 통계 그리드 */
.sg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:1rem}
.sc{background:var(--card);border:1px solid var(--bd);border-radius:var(--r-md);padding:13px}
.sl{font-size:11px;color:var(--t2);margin-bottom:5px;font-weight:500}
.sv{font-size:21px;font-weight:800;letter-spacing:-0.02em}
.ss{font-size:11px;color:var(--t2);margin-top:2px}
.sv2{font-size:21px;font-weight:800;letter-spacing:-0.02em}
.unit{font-size:12px;font-weight:500;color:var(--t2);margin-left:3px}
.subp{font-size:12px;color:var(--green);font-weight:700;margin-top:3px}
.top1row{display:flex;gap:10px;margin-bottom:1rem}
.top1{flex:1;background:var(--card);border:1px solid var(--bd);border-radius:var(--r-md);padding:11px 13px;min-width:0}
.top1l{font-size:11px;color:var(--t2);margin-bottom:4px}
.top1v{font-size:13px;font-weight:600;line-height:1.3}
.sc.wide{margin-bottom:10px}
.mini3{display:flex;gap:8px;margin-top:7px}
.mini3>div{flex:1;text-align:center;min-width:0;background:var(--card2);border-radius:var(--r-sm);padding:8px 4px}
.m3l{font-size:10px;color:var(--t2);margin-bottom:3px;white-space:nowrap}
.m3v{font-size:18px;font-weight:800;letter-spacing:-0.02em}
.m3v.rd{color:var(--red)}
.unit{font-size:12px;font-weight:500;color:var(--t2);margin-left:1px}
.subp{font-size:12px;font-weight:600;color:var(--green);margin-top:2px}
.top1row{display:flex;gap:10px;margin-bottom:1rem}
.top1{flex:1;background:var(--card);border:1px solid var(--bd);border-radius:var(--r-md);padding:11px 13px;min-width:0}
.top1l{font-size:11px;color:var(--t2);margin-bottom:3px}
.top1v{font-size:13px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

/* 리스트 */
.cl{background:var(--card);border:1px solid var(--bd);border-radius:var(--r-lg);overflow:hidden;margin-bottom:1rem}
.cr{display:flex;align-items:center;justify-content:space-between;padding:11px 15px;border-bottom:1px solid var(--bd)}
.cr:last-child{border-bottom:none}
.cr.tot{background:var(--card2)}
.cv{font-size:13px;font-weight:600;color:var(--green)}.cv.r{color:var(--red)}
.cll{font-size:13px;color:var(--t2)}

/* 순위 행 */
.rb{width:27px;height:27px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
.r1{background:var(--amber-l);color:#854F0B}.r2{background:#EEF0EC;color:#444}.r3{background:#FAECE7;color:#993C1D}.rn{background:var(--card2);color:var(--t2)}
.rr{display:flex;align-items:center;gap:11px;padding:11px 15px;border-bottom:1px solid var(--bd)}
.rr:last-child{border-bottom:none}
.rr.hi{background:var(--green-ll)}.rr.hi2{background:var(--blue-l)}
.rn2{flex:1;font-size:13px;font-weight:500;min-width:0}
.rsb{font-size:11px;color:var(--t2);font-weight:400}
.rsc{text-align:right;flex-shrink:0}
.rsa{font-size:13px;font-weight:700;color:var(--green)}.rsa.r{color:var(--red)}
.rsi{font-size:11px;color:var(--amber);margin-top:1px;font-weight:500}
.rhead{display:flex;align-items:center;gap:11px;padding:10px 15px;border-bottom:1px solid var(--bd);background:var(--card2)}
.rhead .sp{flex:1}
.rhc{width:56px;text-align:center;font-size:11.5px;color:var(--t1);font-weight:700;white-space:nowrap}
.rcol{width:56px;text-align:center;flex-shrink:0}
.rcol-v{font-size:14px;font-weight:600}
.rcol.big .rcol-v{font-size:17px;font-weight:800;letter-spacing:-0.02em}
.rhc.w2{width:66px;white-space:normal;line-height:1.15}
.rcol.w2{width:66px}
.m2{display:flex;gap:12px}
.m2>div{flex:1;min-width:0}
.me{display:inline-block;font-size:10px;background:var(--green);color:#fff;padding:1px 7px;border-radius:5px;margin-left:5px;font-weight:600;vertical-align:middle}
.me.b{background:var(--blue)}

/* 막대 */
.bw{background:var(--card);border:1px solid var(--bd);border-radius:var(--r-lg);padding:1.1rem;margin-bottom:1rem}
.bi{display:flex;align-items:center;gap:9px;margin-bottom:8px}.bi:last-child{margin-bottom:0}
.bn{font-size:12px;color:var(--t2);width:46px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;flex-shrink:0;font-weight:500}
.bt{flex:1;height:19px;background:var(--card2);border-radius:5px;overflow:hidden}
.bf{height:100%;border-radius:5px;display:flex;align-items:center;justify-content:flex-end;padding-right:6px;min-width:20px;transition:width .5s ease}
.bf.g{background:#9FE1CB}.bf.gd{background:var(--green)}.bf.bl2{background:var(--blue-ll)}.bf.bld{background:var(--blue)}
.bs{font-size:11px;font-weight:700;color:#085041}

/* 안내 박스 */
.ib{padding:11px 15px;border-radius:var(--r-md);font-size:12px;margin-bottom:1rem;line-height:1.5}
.ib.bl{background:var(--blue-l);color:var(--blue)}
.ib.gr{background:var(--green-l);color:var(--green-d)}
.ib.am{background:var(--amber-l);color:#854F0B}
.tagx{font-size:11px;background:var(--red-l);color:var(--red);padding:2px 9px;border-radius:5px;font-weight:600}
.bpos{display:inline-block;font-size:11px;padding:2px 9px;border-radius:5px;font-weight:600}
.bpos.g{background:var(--green-l);color:var(--green-d)}
.bpos.b{background:var(--blue-l);color:var(--blue)}

/* 업로드 */
.upz{border:1.5px dashed var(--bd2);border-radius:var(--r-lg);padding:1.2rem;margin-bottom:0.8rem;cursor:pointer;background:var(--card);display:flex;align-items:center;gap:13px;transition:all .15s}
.upz:active{background:var(--card2)}
.upz.done{border-color:var(--green);border-style:solid;background:var(--green-ll)}
.upi{width:42px;height:42px;border-radius:var(--r-md);background:var(--green-l);display:flex;align-items:center;justify-content:center;flex-shrink:0}
.upi.done{background:var(--green)}
.upi svg{width:22px;height:22px}
.upl{font-size:13px;font-weight:600}
.ups{font-size:11px;color:var(--t2);margin-top:3px}
.ups.done{color:var(--green-d)}
.actb{width:100%;padding:14px;background:var(--green);color:#fff;border:none;border-radius:var(--r-md);font-size:15px;font-weight:600;cursor:pointer;margin-top:6px;transition:background .15s}
.actb:active{background:var(--green-d)}
.actb:disabled{background:#A8D5C2;cursor:not-allowed}

/* 검색 */
.sb2{display:flex;gap:8px;margin-bottom:1rem}
.si{flex:1;padding:11px 13px;border:1px solid var(--bd2);border-radius:var(--r-md);background:var(--card2);color:var(--t1)}
.si:focus{outline:none;border-color:var(--green);background:#fff}
.sbtn{padding:11px 16px;background:var(--green);color:#fff;border:none;border-radius:var(--r-md);cursor:pointer;font-size:13px;font-weight:600}

/* 직책 토글 */
.rtog{display:flex;gap:7px;margin-bottom:1rem;flex-wrap:wrap}
.rtb{padding:7px 13px;font-size:12px;border:1px solid var(--bd2);border-radius:var(--r-md);background:var(--card);cursor:pointer;color:var(--t2);font-weight:500}
.rtb.on{background:var(--blue);color:#fff;border-color:var(--blue)}

.empty{text-align:center;padding:2rem 1rem;color:var(--t2);font-size:13px}
.ftr{text-align:center;padding:1.5rem 1rem;font-size:11px;color:var(--t3)}
.rkup{color:#16a34a;font-weight:800;font-size:12px}
.rkdn{color:#e03131;font-weight:800;font-size:12px}
.rksame{color:var(--t3);font-weight:700;font-size:12px}
.rknew{color:var(--blue);font-weight:800;font-size:10px;vertical-align:middle}
.rkprev{font-size:9px;font-weight:500;color:var(--t3);margin-right:2px;vertical-align:middle}
.mtnote{font-size:10.5px;font-weight:500;color:var(--t3);margin-left:2px}
.rkstl{font-size:15.5px;font-weight:800;color:var(--t1);margin:22px 0 10px;padding:8px 12px;border-left:4px solid var(--green);background:var(--card2);border-radius:0 8px 8px 0}
.rkstlsub{font-size:11px;font-weight:500;color:var(--t3)}
.topcard{background:linear-gradient(180deg,rgba(29,158,117,.10),rgba(29,158,117,.03));border:1.5px solid rgba(29,158,117,.35)}
.topcl{font-size:14px;font-weight:800;color:var(--green);margin-bottom:4px}
.toplist{display:flex;flex-direction:column;gap:12px;margin-top:8px}
.topg{background:var(--card);border-radius:10px;padding:10px 12px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
.topgl{font-size:13px;font-weight:800;color:var(--t1);margin-bottom:7px}
.toprow{display:flex;align-items:center;gap:9px;padding:5px 0}
.toprow+.toprow{border-top:1px dashed var(--bd)}
.topscope{font-size:11px;font-weight:800;color:#fff;background:var(--amber);border-radius:5px;padding:3px 9px;flex:0 0 auto}
.topscope.tc{background:var(--blue)}
.topnm{flex:1;font-size:15px;color:var(--t1);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.topv{font-size:20px;font-weight:900;flex:0 0 auto}
.chwrap{max-width:420px;margin:34px auto;padding:0 8px}
.chhi{font-size:18px;font-weight:700;text-align:center;color:var(--t1)}
.chsub{font-size:13px;color:var(--t2);text-align:center;margin:5px 0 24px}
.chbtn{display:block;width:100%;border:1.5px solid var(--bd);background:var(--card);border-radius:16px;padding:24px 18px;margin-bottom:14px;text-align:center;cursor:pointer;transition:transform .12s,box-shadow .12s}
.chbtn:active{transform:scale(.99)}
.chbtn.award{border-color:rgba(29,158,117,.45);background:linear-gradient(180deg,rgba(29,158,117,.09),rgba(29,158,117,.02))}
.chbtn.inc{border-color:rgba(245,158,11,.45);background:linear-gradient(180deg,rgba(245,158,11,.10),rgba(245,158,11,.02))}
.chic{font-size:42px;line-height:1}
.chtt{font-size:20px;font-weight:800;margin-top:9px;color:var(--t1)}
.chds{font-size:12px;color:var(--t2);margin-top:4px}
.incres{text-align:center;font-size:17px;font-weight:800;padding:12px;border-radius:12px;margin:6px 0 12px}
.incres.win{color:#0f7a4d;background:rgba(29,158,117,.12)}
.incres.lose{color:var(--t2);background:var(--card2)}
.iclist{display:flex;flex-direction:column;gap:9px}
.icrow{display:flex;justify-content:space-between;align-items:center;padding:13px 14px;background:var(--card2);border-radius:12px;border:1px solid var(--bd)}
.iclt{display:flex;flex-direction:column;gap:5px}
.icl1{font-size:14px;font-weight:700;color:var(--t1)}

.icgift{margin-top:12px;text-align:center;font-size:15px;font-weight:800;color:#b45309;background:rgba(245,158,11,.13);border-radius:12px;padding:13px}

.isrna{font-size:12px;font-weight:700;color:var(--t3);flex:0 0 auto}
.isamt{font-size:11.5px;font-weight:800;color:var(--green);white-space:nowrap;text-align:right}

/* ───── GitHub에 baked.js 저장 (관리자 업로드 시) ───── */
function b64utf8(s){return btoa(unescape(encodeURIComponent(s)));}
/* ───── 공용암호 암호화 (XOR + base64) ───── */
var PASS='';
function xorEnc(str,key){var s=unescape(encodeURIComponent(str)),o='';for(var i=0;i<s.length;i++){o+=String.fromCharCode(s.charCodeAt(i)^key.charCodeAt(i%key.length));}return btoa(o);}
function xorDec(b64,key){var s=atob(b64),o='';for(var i=0;i<s.length;i++){o+=String.fromCharCode(s.charCodeAt(i)^key.charCodeAt(i%key.length));}return decodeURIComponent(escape(o));}
function decJSON(text){text=(text||'').trim();if(text.indexOf('ENC1:')===0)return JSON.parse(xorDec(text.slice(5),PASS));return JSON.parse(text);}
function encContent(text){return 'ENC1:'+xorEnc(text,PASS);}
function parseBaked(txt){var raw=txt.replace(/^\s*var\s+BAKED\s*=/,'').replace(/;\s*$/,'').trim();if(raw.charAt(0)==='"'||raw.charAt(0)==="'")raw=JSON.parse(raw);if(typeof raw==='string'&&raw.indexOf('ENC1:')===0)return JSON.parse(xorDec(raw.slice(5),PASS));return JSON.parse(raw);}
async function dfetch(path){var r=await fetch(path,{cache:'no-store'});var t=r.ok?await r.text():'';return {ok:r.ok,_t:t,text:function(){return Promise.resolve(this._t);},json:function(){return Promise.resolve(decJSON(this._t));}};}
async function verifyPass(pw){try{var r=await fetch('auth.json?t='+Date.now(),{cache:'no-store'});if(!r.ok)return true;var t=(await r.text()).trim();if(t.indexOf('ENC1:')!==0)return true;try{return xorDec(t.slice(5),pw)==='KUMON_OK';}catch(e){return false;}}catch(e){return true;}}
function gate(){return new Promise(function(resolve){
  var SAVE_KEY='kumon_pass';
  // 저장된 암호가 현재 auth.json 기준으로 유효하면 입력창 없이 통과
  (async function(){
    try{
      var saved=localStorage.getItem(SAVE_KEY);
      if(saved){var ok0=await verifyPass(saved);if(ok0){PASS=saved;resolve();return;}
        localStorage.removeItem(SAVE_KEY);}
    }catch(e){}
    showGate();
  })();
  function showGate(){
  var ov=document.createElement('div');ov.id='gateOv';
  ov.style.cssText='position:fixed;inset:0;z-index:99999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;gap:14px';
  ov.innerHTML='<div style="font-size:34px">🔒</div><div style="font-size:19px;font-weight:800;color:var(--t1)">시상·인센티브 현황 조회</div>'
    +'<div style="font-size:13px;color:var(--t3)">공용 암호를 입력하세요</div>'
    +'<div style="font-size:12px;color:var(--amber);font-weight:600">공용암호는 매월 변경됩니다</div>'
    +'<input id="gatePw" type="password" placeholder="공용 암호" style="width:100%;max-width:280px;padding:13px 15px;border:1px solid var(--bd);border-radius:11px;background:var(--card);color:var(--t1);font-size:15px;text-align:center" />'
    +'<button id="gateBtn" style="width:100%;max-width:280px;padding:13px;border:none;border-radius:11px;background:var(--green);color:#fff;font-size:15px;font-weight:700;cursor:pointer">확인</button>'
    +'<div id="gateErr" style="font-size:12px;color:var(--red);min-height:16px"></div>'
    +'<div style="font-size:11px;color:var(--t3)">한 번 입력하면 이 기기에 저장돼요 (암호 변경 시 다시 입력)</div>';
  document.body.appendChild(ov);
  var inp=ov.querySelector('#gatePw'),btn=ov.querySelector('#gateBtn'),err=ov.querySelector('#gateErr');
  async function submit(){btn.disabled=true;err.textContent='확인 중...';var pw=inp.value.trim();var ok=await verifyPass(pw);if(ok){PASS=pw;try{localStorage.setItem(SAVE_KEY,pw);}catch(e){}ov.remove();resolve();}else{err.textContent='암호가 올바르지 않습니다.';btn.disabled=false;inp.select();}}
  btn.onclick=submit;inp.addEventListener('keydown',function(e){if(e.key==='Enter')submit();});
  setTimeout(function(){inp.focus();},100);
  }
});}

function rankDeltaBr(map,key,cur,field){var d=rankDelta(map,key,cur,field);return d?'<br>'+d.replace(/^ /,''):'';}
function rankDelta(map,key,cur,field){
  if(!map||!Object.keys(map).length)return '';
  var rec=map[key];
  var lbl='<span class="rkprev">전일대비</span>';
  if(rec==null)return ' '+lbl+'<span class="rknew">NEW</span>';
  var p=(typeof rec==='object')?rec[field||'n']:rec;
  if(p==null)return '';
  var d=p-cur;
  if(d>0)return ' '+lbl+'<span class="rkup">▲'+d+'</span>';
  if(d<0)return ' '+lbl+'<span class="rkdn">▼'+(-d)+'</span>';
  return ' '+lbl+'<span class="rksame">—</span>';
}
async function saveFile(path,content,message){
  var api='https://api.github.com/repos/'+GH.owner+'/'+GH.repo+'/contents/'+path;
  var hd={'Authorization':'Bearer '+GH.token,'Accept':'application/vnd.github+json'};
  var sha=null;
  try{var g=await fetch(api+'?t='+Date.now(),{headers:hd,cache:'no-store'});if(g.ok){var gj=await g.json();sha=gj.sha;}}catch(e){}
  if(!sha){try{var tr=await fetch('https://api.github.com/repos/'+GH.owner+'/'+GH.repo+'/git/trees/'+GH.branch+'?recursive=1',{headers:hd,cache:'no-store'});if(tr.ok){var trj=await tr.json();(trj.tree||[]).forEach(function(it){if(it.path===path)sha=it.sha;});}}catch(e){}}
  var body={message:message,content:b64utf8(encContent(content))};
  if(sha)body.sha=sha;
  var r=await fetch(api,{method:'PUT',headers:hd,body:JSON.stringify(body)});
  if(!r.ok){var et=await r.text();throw new Error('저장 실패 ('+r.status+')');}
  return true;
}
async function saveToGitHub(bakedJs){
  var api='https://api.github.com/repos/'+GH.owner+'/'+GH.repo+'/contents/'+GH.path;
  var hd={'Authorization':'Bearer '+GH.token,'Accept':'application/vnd.github+json'};
  var sha=null;
  try{var g=await fetch(api+'?t='+Date.now(),{headers:hd,cache:'no-store'});if(g.ok){var gj=await g.json();sha=gj.sha;}}catch(e){}
  if(!sha){try{var tr=await fetch('https://api.github.com/repos/'+GH.owner+'/'+GH.repo+'/git/trees/'+GH.branch,{headers:hd,cache:'no-store'});if(tr.ok){var trj=await tr.json();(trj.tree||[]).forEach(function(it){if(it.path===GH.path)sha=it.sha;});}}catch(e){}}
  var body={message:'데이터 갱신 '+new Date().toISOString(),content:b64utf8(bakedJs)};
  if(sha)body.sha=sha;
  var r=await fetch(api,{method:'PUT',headers:hd,body:JSON.stringify(body)});
  if(!r.ok){var et=await r.text();throw new Error('GitHub 저장 실패 ('+r.status+'): '+et.slice(0,120));}
  return true;
}

function rankTop20(sorted,myCode,valFn,cutoff){
  if(!sorted||!sorted.length)return '';

    var rk=i+1, me=(x.소속코드===myCode), win=cutoff&&rk<=cutoff;

      +'<div class="r20-n">'+rk+'</div>'
      +'<div class="r20-nm">'+(x.소속명||x.name||'')+(me?' <span class="r20-me">나</span>':'')+'</div>'
      +'<div class="r20-v">'+v[0]+'<span class="r20-u">'+(v[1]||'')+'</span></div></div>';
  }).join('');
  var cutLine=cutoff?'<div class="r20cut">— 선정 기준 '+cutoff+'위 —</div>':'';
  // 본인이 20위 밖이면 맨 아래 표시
  var myExtra='';
  if(myCode){var mi=-1;for(var k=0;k<sorted.length;k++){if(sorted[k].소속코드===myCode){mi=k;break;}}
    if(mi>=20){var x=sorted[mi],v=valFn(x);myExtra='<div class="r20 me"><div class="r20-n">'+(mi+1)+'</div><div class="r20-nm">'+(x.소속명||x.name)+' <span class="r20-me">나</span></div><div class="r20-v">'+v[0]+'<span class="r20-u">'+(v[1]||'')+'</span></div></div>';}}

  var html='<div class="r20wrap"><div class="r20head">📊 상위 20개 순위</div>';
  if(cutoff&&cutoff<top.length){
    var a=top.slice(0,cutoff).map(function(x,i){var me=(x.소속코드===myCode),v=valFn(x);return '<div class="r20 win'+(me?' me':'')+'"><div class="r20-n">'+(i+1)+'</div><div class="r20-nm">'+(x.소속명||x.name)+(me?' <span class="r20-me">나</span>':'')+'</div><div class="r20-v">'+v[0]+'<span class="r20-u">'+(v[1]||'')+'</span></div></div>';}).join('');
    var b=top.slice(cutoff).map(function(x,i){var me=(x.소속코드===myCode),v=valFn(x);return '<div class="r20'+(me?' me':'')+'"><div class="r20-n">'+(cutoff+i+1)+'</div><div class="r20-nm">'+(x.소속명||x.name)+(me?' <span class="r20-me">나</span>':'')+'</div><div class="r20-v">'+v[0]+'<span class="r20-u">'+(v[1]||'')+'</span></div></div>';}).join('');
    html+=a+cutLine+b;
  }else html+=rows;
  html+=myExtra+'</div>';
  return html;
}

function defaultSnapMonth(){var d=new Date();d.setDate(d.getDate()-1);return d.getFullYear()+'-'+('0'+(d.getMonth()+1)).slice(-2);}
function monthLabel(m){var p=String(m).split('-');return p.length===2?(p[0]+'년 '+parseInt(p[1],10)+'월'):m;}
async function doSnapshot(){
  var btn=document.getElementById('snbtn'),msg=document.getElementById('smsg');
  var m=(document.getElementById('snm').value||'').trim();
  if(!/^\d{4}-\d{2}$/.test(m)){msg.innerHTML='<span style="color:var(--red)">월 형식은 YYYY-MM 이어야 해요 (예: 2026-07)</span>';return;}
  if(!APP.teachers.length){msg.innerHTML='<span style="color:var(--red)">먼저 데이터를 반영해주세요.</span>';return;}
  btn.disabled=true;btn.textContent='저장 중...';msg.innerHTML='<span style="color:var(--blue)">스냅샷 생성 중...</span>';
  try{
    var snap=buildSnapshot(m);
    await tick();
    msg.innerHTML='<span style="color:var(--blue)">GitHub에 저장 중...</span>';
    await saveFile('history/'+m+'.json',JSON.stringify(snap),'스냅샷 '+m);
    // 인덱스 갱신
    var idx=(APP.histIndex||[]).filter(function(h){return h.month!==m;});
    idx.push({month:m,label:monthLabel(m),date:APP.meta.date||''});
    idx.sort(function(a,b){return b.month<a.month?-1:1;});
    await saveFile('history/index.json',JSON.stringify(idx),'기록 인덱스 '+m);
    APP.histIndex=idx;APP.histCache[m]=snap;
    msg.innerHTML='<span style="color:var(--green)">✅ '+monthLabel(m)+' 기록 저장 완료! 약 1분 뒤 조회 화면에 반영돼요.</span>';
  }catch(e){msg.innerHTML='<span style="color:var(--red)">저장 실패: '+(e.message||e)+'</span>';}
  btn.disabled=false;btn.textContent='이번 달 기록 저장';
}
function buildSnapshot(m){
  var t=APP.teachers.slice();
  var snapT={};t.forEach(function(r){snapT[r.교사번호]={s:r.시상계,n:r.순위,c:r.총국순위,mj:r.과목순증,dg:r.디지털순증};});
  var rankT=t.slice(0,50).map(function(r){return {nm:r.교사명,so:r.소속명,s:r.시상계,n:r.순위,c:r.총국순위,mj:r.과목순증,dg:r.디지털순증};});
  var snapO={},rankO={};
  ['지구','지국','사업국','총국'].forEach(function(rl){
    var arr=(APP.org[rl]||[]);
    arr.forEach(function(o){snapO[o.소속코드]={d:o.지구당,n:o.순위,c:o.총국순위,lv:rl,mj:o.과목순증,dg:o.디지털순증};});
    rankO[rl]=arr.slice().sort(function(a,b){return b.지구당-a.지구당;}).slice(0,50).map(function(o){return {nm:o.관리자명||'(공석)',so:o.소속명,d:o.지구당,n:o.순위,c:o.총국순위,mj:o.과목순증,dg:o.디지털순증};});
  });
  var L=APP.incList,n=L.length,snapInc={};
  L.forEach(function(r){var items=[];
    if(r.과목순증>=5||r.입회>=12)items.push({name:'월 성과',award:'스퀘어가든 3in1 마스터 멀티다지기'});
    if(r.유입>=5)items.push({name:'신규 회원',award:'네이버페이 2만원'});else if(r.유입>=3)items.push({name:'신규 회원',award:'네이버페이 1만원'});
    if(r.마스타시상==='전사')items.push({name:'마스타 순증',award:'시상금 20만원 (전사)'});else if(r.마스타시상==='총국')items.push({name:'마스타 순증',award:'시상금 10만원 (총국)'});
    if(items.length)snapInc[r.교사번호]=items;});
  var snapJigu={};(APP.incJigu||[]).forEach(function(o){if(o.회원순증>=1)snapJigu[o.소속코드]={ns:o.회원순증,pay:o.회원순증*10000};});
  var ms=L.filter(function(r){return r.과목순증>=5||r.입회>=12;}).length;
  var n1=L.filter(function(r){return r.유입>=3;}).length,n2=L.filter(function(r){return r.유입>=5;}).length;
  var msJ=L.filter(function(r){return r.마스타시상==='전사';}).length,msC=L.filter(function(r){return r.마스타시상==='총국';}).length;
  var jk=Object.keys(snapJigu),jPay=jk.reduce(function(s,k){return s+snapJigu[k].pay;},0);
  var jt=(APP.incJigu||[]).length||1;
  var tot=L.filter(function(r){return (r.과목순증>=5)||(r.입회>=12)||(r.유입>=3);}).length;
  var JK=APP.incJiguk||[], jkSel=JK.filter(function(x){return x.등급;}), jkPay=jkSel.reduce(function(s,x){return s+x.시상금;},0), jkT=JK.length||1;
  var agg=[
    {name:'월 성과 인센티브',cnt:ms,pct:(ms/n*100).toFixed(1),amt:ms*21065,unit:'명'},
    {name:'신규 회원 인센티브',cnt:n1,pct:(n1/n*100).toFixed(1),amt:(n1-n2)*10000+n2*20000,unit:'명'},
    {name:'마.스.타 순증 인센티브',cnt:msJ+msC,pct:((msJ+msC)/n*100).toFixed(1),amt:msJ*200000+msC*100000,unit:'명'},
    {name:'마.스.타 교차관리',cnt:Object.keys(APP.incCross||{}).length,pct:'',amt:Object.keys(APP.incCross||{}).reduce(function(s,k){return s+APP.incCross[k];},0)*10000,unit:'명'},
    {name:'전체 수혜 교사(중복 제외)',cnt:tot,pct:(tot/n*100).toFixed(1),amt:0,unit:'명'},
    {name:'지구 인센티브(회원순증)',cnt:jk.length,pct:(jk.length/jt*100).toFixed(1),amt:jPay,unit:'개'},
    {name:'지국 인센티브(마.스.타)',cnt:jkSel.length,pct:(jkSel.length/jkT*100).toFixed(1),amt:jkPay,unit:'개'},
    {name:'매니저 인센티브(다지기)',cnt:(APP.incManager||[]).filter(function(x){return x.달성;}).length,pct:((APP.incManager||[]).length?((APP.incManager||[]).filter(function(x){return x.달성;}).length/(APP.incManager||[]).length*100).toFixed(1):'0'),amt:0,unit:'개'},
    {name:'환경개선(2분기 상위10)',cnt:(APP.incEnv||[]).filter(function(x){return x.선정;}).length,pct:'',amt:(APP.incEnv||[]).filter(function(x){return x.선정;}).reduce(function(s,x){return s+(x.교사6월||0)*20000;},0),unit:'개'}
  ];
  return {month:m,label:monthLabel(m),date:APP.meta.date||'',t:snapT,o:snapO,rankT:rankT,rankO:rankO,inc:snapInc,jigu:snapJigu,agg:agg};
}

function pickFile(input,type){
  var f=input.files[0];if(!f)return;
  var msg=document.getElementById('umsg');if(msg)msg.textContent='';
  var rd=new FileReader();
  rd.onload=function(e){UP[type]={data:new Uint8Array(e.target.result),name:f.name};renderAdmin();};
  rd.readAsArrayBuffer(f);
}

function findCol(h,cands){for(var k=0;k<cands.length;k++){for(var i=0;i<h.length;i++){if(h[i]!=null&&String(h[i]).trim().indexOf(cands[k])>=0)return i;}}return -1;}
function mergeHeader(rows){var h0=rows[0]||[],h1=rows[1]||[],n=Math.max(h0.length,h1.length),h=[];for(var c=0;c<n;c++){var a=(h1[c]!=null?String(h1[c]).trim():''),b=(h0[c]!=null?String(h0[c]).trim():'');h[c]=a+(a&&b?' ':'')+b;}return h;}
function shortName(s){return String(s||'').replace(/(지구|지소|지국)$/,'').replace(/지$/,'');}
function topCard(arr,pref,nameFn,skipChong){
  function mx(key,pf){var b=null;for(var i=0;i<arr.length;i++){var x=arr[i];if(pf&&(x.소속코드||'').charAt(0)!==pf)continue;if(b===null||x[key]>b[key])b=x;}return b;}
  function row(scope,cls,e,key){var v=e?e[key]:null;return '<div class="toprow"><span class="topscope'+cls+'">'+scope+'</span><span class="topnm">'+(e?nameFn(e):'-')+'</span><span class="topv" style="color:'+(v!=null&&v<0?'var(--red)':'var(--green)')+'">'+(e?fmt(v):'-')+'</span></div>';}
  function grp(label,key){return '<div class="topg"><div class="topgl">'+label+' 1위</div>'+row('전사','',mx(key,null),key)+(skipChong?'':row('총국',' tc',mx(key,pref),key))+'</div>';}
  return '<div class="sc wide topcard"><div class="sl topcl">🏆 핵심지표 TOP</div><div class="toplist">'+grp('과목순증','과목순증')+grp('디지털순증','디지털순증')+'</div></div>';
}

/* 저장 용량 절감: 교사 데이터를 배열 형식으로 인코딩 */
var T_KEYS=['소속코드','소속명','교사번호','교사명','근무기간','전월말관리과목','과목순증','특별점수','디지털순증','태블릿점수','펜세트점수','스구N전환재약정','스구N재약정','시상계','입회'];
function encT(rec){return rec.map(function(r){return T_KEYS.map(function(k){return r[k];});});}
function decT(arr){if(!arr||!arr.length)return [];if(!Array.isArray(arr[0]))return arr;return arr.map(function(a){var o={};T_KEYS.forEach(function(k,i){o[k]=a[i];});return o;});}
function rankTeachers(rec){
  function cmp(a,b){return (b.시상계-a.시상계)||(b.전월말관리과목-a.전월말관리과목);}
  rec.sort(cmp);rec.forEach(function(r,i){r.순위=i+1;});
  var grp={};rec.forEach(function(r){var g=(r.소속코드||'').charAt(0);(grp[g]=grp[g]||[]).push(r);});
  Object.keys(grp).forEach(function(g){grp[g].sort(cmp);grp[g].forEach(function(r,i){r.총국순위=i+1;r.총국총원=grp[g].length;});});
  return rec;
}

function parseTeacher(data){
  var wb=XLSX.read(data,{type:'array'});
  var ws=wb.Sheets[wb.SheetNames[0]];

  var mult={Legend:20000,Best:15000,Great:10000,Good:5000};
  var tie={};
  if(orgData){var wbT=XLSX.read(orgData,{type:'array'});var rT=XLSX.utils.sheet_to_json(wbT.Sheets[wbT.SheetNames[0]],{header:1,defval:''});for(var i=2;i<rT.length;i++){var r=rT[i];if(!r)continue;var cc=String(r[0]||'').trim();var tch=Number(r[4])||0;tie[cc]={달성률:Number(r[37])||0,Dsung:tch>0?(Number(r[42])||0)/tch:0};}}
  var wb=XLSX.read(jikData,{type:'array'});var rows=XLSX.utils.sheet_to_json(wb.Sheets[wb.SheetNames[0]],{header:1,defval:''});
  var start=3;for(var i=0;i<8;i++){if(/^[A-Za-z]{2}\d{3}$/.test(String((rows[i]||[])[0]||'').trim())){start=i;break;}}

  for(var i=start;i<rows.length;i++){var row=rows[i];if(!row)continue;var cc=String(row[0]||'').trim();if(classifyOrg(cc)!=='지국')continue;var msSung=Number(row[36])||0,tch=Number(row[8])||0,ip=Number(row[33])||0;if(tch<=0)continue;var tt=tie[cc]||{달성률:-1e9,Dsung:-1e9};cand.push({소속코드:cc,소속명:String(row[1]||'').trim().replace(/지$/,'지구'),관리자:String(row[3]||'').trim(),총국:L2C[cc.charAt(0)]||'?',마스타순증:msSung,인당순증:Math.floor(msSung/tch*100)/100,인당입회:ip,달성률:tt.달성률,Dsung:tt.Dsung});}

function parseOrg(data){
  var wb=XLSX.read(data,{type:'array'});
  var ws=wb.Sheets[wb.SheetNames[0]];
  var rows=XLSX.utils.sheet_to_json(ws,{header:1,defval:''});
  var h=mergeHeader(rows);
  var C={소속코드:findCol(h,['소속코드']),소속명:findCol(h,['소속명']),관리자명:findCol(h,['관리자명']),사번:findCol(h,['사번']),전월말:findCol(h,['전월말']),과목순증:findCol(h,['과목순증']),특별점수:findCol(h,['특별점수']),디지털순증:findCol(h,['디지털순증']),태블릿:findCol(h,['태블릿']),펜세트:findCol(h,['펜세트']),스구N전환재약정:findCol(h,['스구N 전환재약정','전환재약정']),스구N재약정:findCol(h,['스구N 재약정']),시상점수:findCol(h,['시상점수']),지구수:findCol(h,['지구수']),지구당:findCol(h,['지구당']),달성률:findCol(h,['달성률'])};
  if(C.소속코드<0)throw new Error('소속코드 열을 찾지 못했습니다.');
  var res={지구:[],지국:[],사업국:[],총국:[]};
  for(var i=2;i<rows.length;i++){
    var row=rows[i];if(!row)continue;
    var code=String(row[C.소속코드]||'').trim();
    var rl=classifyOrg(code);if(!rl)continue;
    var mn=String(row[C.관리자명]||'').trim(),sb=String(row[C.사번]||'').trim().split('.')[0];
    if(mn==='nan')mn='';if(sb==='nan')sb='';
    res[rl].push({소속코드:code,소속명:String(row[C.소속명]||'').trim().replace(/지$/,'지구'),관리자명:mn||'(공석)',사번:sb,
      전월말:Number(row[C.전월말])||0,과목순증:Number(row[C.과목순증])||0,특별점수:fmt2(Number(row[C.특별점수])||0),디지털순증:Number(row[C.디지털순증])||0,
      태블릿점수:fmt2(Number(row[C.태블릿])||0),펜세트점수:fmt2(Number(row[C.펜세트])||0),스구N전환재약정:fmt2(Number(row[C.스구N전환재약정])||0),스구N재약정:fmt2(Number(row[C.스구N재약정])||0),
      시상점수:fmt2(Number(row[C.시상점수])||0),지구수:Number(row[C.지구수])||0,지구당:fmt2(Number(row[C.지구당])||0),달성률:fmt2(Number(row[C.달성률])||0)});
  }
  ['지구','지국','사업국','총국'].forEach(function(rl){
    res[rl].sort(function(a,b){return b.지구당-a.지구당;});
    res[rl].forEach(function(r,i){r.순위=i+1;});
    var grp={};
    res[rl].forEach(function(r){var g=(r.소속코드||'').charAt(0);(grp[g]=grp[g]||[]).push(r);});
    Object.keys(grp).forEach(function(g){grp[g].sort(function(a,b){return b.지구당-a.지구당;});grp[g].forEach(function(r,i){r.총국순위=i+1;r.총국총원=grp[g].length;});});
  });
  return res;
}

}

function adminRank(){
  if(!APP.teachers.length)return '<div class="empty">데이터가 없습니다. 파일을 업로드해주세요.</div>';
  var top=APP.teachers.slice(0,50);
  var total=APP.meta.total||APP.teachers.length;
  var subjInc=APP.teachers.filter(function(x){return x.과목순증>=0;}).length;
  var subjPct=total?Math.round(subjInc/total*100):0;
  var digInc=APP.teachers.filter(function(x){return x.디지털순증>=0;}).length;
  var digPct=total?Math.round(digInc/total*100):0;
  var t1Subj=APP.teachers.reduce(function(m,x){return (!m||x.과목순증>m.과목순증)?x:m;},null);
  var t1Dig=APP.teachers.reduce(function(m,x){return (!m||x.디지털순증>m.디지털순증)?x:m;},null);
  return ''
    +'<div class="sg">'
    +'<div class="sc"><div class="sl">대상자</div><div class="sv">'+total.toLocaleString()+'<span class="unit">명</span></div></div>'
    +'<div class="sc"><div class="m2">'
    +'<div><div class="sl">과목순증 <span style="font-weight:700;color:var(--green);font-size:10px">(0이상)</span></div><div class="sv" style="color:var(--green)">'+subjInc.toLocaleString()+'<span class="unit">명</span></div><div class="subp">('+subjPct+'%)</div></div>'
    +'<div><div class="sl">디지털순증 <span style="font-weight:700;color:var(--green);font-size:10px">(0이상)</span></div><div class="sv" style="color:var(--green)">'+digInc.toLocaleString()+'<span class="unit">명</span></div><div class="subp">('+digPct+'%)</div></div>'
    +'</div></div>'
    +'</div>'
    +'<div class="top1row">'
    +'<div class="top1"><div class="top1l">과목순증 1위</div><div class="top1v">'+(t1Subj?shortName(t1Subj.소속명)+' '+t1Subj.교사명+' '+fmt(t1Subj.과목순증):'-')+'</div></div>'
    +'<div class="top1"><div class="top1l">D순증 1위</div><div class="top1v">'+(t1Dig?shortName(t1Dig.소속명)+' '+t1Dig.교사명+' '+fmt(t1Dig.디지털순증):'-')+'</div></div>'
    +'</div>'
    +'<div class="cl">'
    +'<div class="rhead"><div class="sp"></div><div class="rhc">과목순증</div><div class="rhc">디지털순증</div><div class="rhc">시상점수</div></div>'
    +top.map(function(r){return '<div class="rr"><div class="rb" style="'+badgeStyle(r.순위)+'">'+r.순위+'</div><div class="rn2">'+r.교사명+'<br><span class="rsb">'+r.소속명+'</span></div><div class="rcol"><div class="rcol-v"'+(r.과목순증<0?' style="color:var(--red)"':'')+'>'+fmt1(r.과목순증)+'</div></div><div class="rcol"><div class="rcol-v"'+(r.디지털순증<0?' style="color:var(--red)"':'')+'>'+fmt(r.디지털순증)+'</div></div><div class="rcol big"><div class="rcol-v" style="color:'+(r.시상계<0?'var(--red)':'var(--green)')+'">'+fmt1(r.시상계)+'</div></div></div>';}).join('')+'</div>';
}

function search(){
  var h='<div class="mt">교사 조회</div><div class="sb2"><input class="si" id="sInp" placeholder="이름 또는 교사번호..."><button class="sbtn" onclick="doSearch()">조회</button></div>';
  if(S.search===null)return h;
  if(!S.search)return h+'<div class="empty">검색 결과가 없습니다.</div>';
  var r=S.search,aw=fmt1(r.시상계);
  return h+'<div class="hc"><div class="ht"><div class="av">'+r.교사명.slice(0,2)+'</div><div><div class="hn">'+r.교사명+'</div><div class="hsb"><span class="bpos g">교사</span> · '+r.소속명+' · <b style="color:var(--amber)">'+r.순위+'위</b></div></div></div>'
    +'<div class="sg"><div class="sc"><div class="sl">시상점수</div><div class="sv" style="color:'+(aw>=0?'var(--green)':'var(--red)')+'">'+aw+'</div></div>'
    +'<div class="sc"><div class="sl">교사번호</div><div class="sv" style="font-size:15px">'+r.교사번호+'</div></div>'
    +'<div class="sc"><div class="sl">근무기간</div><div class="sv" style="font-size:15px">'+r.근무기간+'개월</div></div>'
    +'<div class="sc"><div class="sl">소속</div><div class="sv" style="font-size:14px">'+r.소속명+'</div></div></div></div>';
}
function doSearch(){var q=document.getElementById('sInp').value.trim();if(!q)return;S.search=APP.teachers.find(function(r){return r.교사명===q||r.교사번호===q;})||false;renderAdmin();}

document.addEventListener('keydown',function(e){if(e.key==='Enter'){var lp=document.getElementById('lp');if(lp&&lp.classList.contains('active'))doLogin();}});
</script>
</body>
</html>
